<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CV Builder</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- FORM -->
    <div class="form-box">
      <h1>CV Builder</h1>
      <p>Isi data CV disini.</p>

      <input type="text" id="name" placeholder="Nama Lengkap">
      <input type="email" id="email" placeholder="Email">
      <input type="text" id="phone" placeholder="Nomor HP">

      <textarea id="address" placeholder="Alamat"></textarea>

      <textarea id="summary" placeholder="Tentang Diri"></textarea>

      <textarea id="education" placeholder="Pendidikan"></textarea>

      <textarea id="experience" placeholder="Pengalaman"></textarea>

      <textarea id="skills" placeholder="Skill"></textarea>
    </div>

    <!-- PREVIEW -->
    <div class="preview-box">
      <h1 id="previewName">Nama Lengkap</h1>

      <p id="previewEmail">email@example.com</p>
      <p id="previewPhone">+62 xxxx</p>
      <p id="previewAddress">Alamat</p>

      <hr>

      <h2>Tentang Saya</h2>
      <p id="previewSummary">Deskripsi diri.</p>

      <h2>Pendidikan</h2>
      <p id="previewEducation">Riwayat pendidikan.</p>

      <h2>Pengalaman</h2>
      <p id="previewExperience">Pengalaman kerja / organisasi.</p>

      <h2>Skill</h2>
      <p id="previewSkills">HTML, CSS, JavaScript</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
